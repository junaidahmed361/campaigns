name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.0'
        required: true
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ inputs.tag }}' dist/*             --title '${{ inputs.tag }}'             --notes 'Campaigns package release. Publishing to PyPI is handled by the Publish to PyPI workflow on release publication.'             ${{ inputs.prerelease == 'true' && '--prerelease' || '' }}
